<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-100 via-pink-50 to-orange-100">

  <div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-2xl p-8 w-full max-w-md border border-white/30">

    <!-- Title -->
    <h1 class="text-3xl font-extrabold text-center mb-2 text-gray-800">
      Hallo Admin
    </h1>

    <p class="text-center text-gray-500 mb-6 text-sm">
      Silakan masuk untuk mengelola data wisata
    </p>

    <form action="/admin/login" method="POST" class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block mb-1 text-sm font-semibold text-gray-600">
          Username
        </label>

        <input
          type="text"
          name="username"
          placeholder="Masukkan username"
          class="w-full border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"
          required
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block mb-1 text-sm font-semibold text-gray-600">
          Password
        </label>

        <input
          type="password"
          name="password"
          placeholder="Masukkan password"
          class="w-full border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition"
          required
        >
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-gradient-to-r from-purple-500 via-pink-500 to-orange-400 text-white py-2 rounded-xl font-semibold shadow-md hover:scale-[1.02] hover:shadow-lg transition duration-200"
      >
        Masuk ke Dashboard
      </button>

    </form>

  </div>

</body>
</html>
